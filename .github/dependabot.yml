version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      ml-stack:
        patterns:
          - "torch*"
          - "pyannote*"
          - "lightning*"
          - "huggingface*"
          - "soundfile"
      everything-else:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
